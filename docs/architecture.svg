<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="roseGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e11d48"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <linearGradient id="termGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c4a6e"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="620" fill="url(#bg)" rx="12"/>
  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#7dd3fc" font-size="11" font-weight="600" letter-spacing="3">MOBIUS CIVIC AI TERMINAL · ARCHITECTURE</text>
  <!-- Layer 1: Internet / Signals -->
  <rect x="200" y="58" width="400" height="64" rx="8" fill="none" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="400" y="82" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="2">INTERNET / SIGNALS</text>
  <text x="400" y="104" text-anchor="middle" fill="#64748b" font-size="12">news · feeds · agent observations · user reports</text>
  <!-- Arrow 1 -->
  <line x1="400" y1="122" x2="400" y2="148" stroke="#334155" stroke-width="1.5"/>
  <polygon points="394,144 400,154 406,144" fill="#334155"/>
  <!-- Layer 2: Mobius Agents -->
  <rect x="120" y="156" width="560" height="86" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <text x="400" y="178" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="600" letter-spacing="2">MOBIUS AGENTS</text>
  <!-- Agent boxes -->
  <rect x="144" y="190" width="80" height="36" rx="5" fill="#0c4a6e" stroke="#0ea5e9" stroke-width="1"/>
  <text x="184" y="205" text-anchor="middle" fill="#7dd3fc" font-size="10" font-weight="600">ECHO</text>
  <text x="184" y="218" text-anchor="middle" fill="#64748b" font-size="8">detect</text>
  <text x="240" y="210" text-anchor="middle" fill="#334155" font-size="14">→</text>
  <rect x="256" y="190" width="80" height="36" rx="5" fill="#4c0519" stroke="#f43f5e" stroke-width="1"/>
  <text x="296" y="205" text-anchor="middle" fill="#fda4af" font-size="10" font-weight="600">HERMES</text>
  <text x="296" y="218" text-anchor="middle" fill="#64748b" font-size="8">route</text>
  <text x="352" y="210" text-anchor="middle" fill="#334155" font-size="14">→</text>
  <rect x="368" y="190" width="80" height="36" rx="5" fill="#451a03" stroke="#f59e0b" stroke-width="1"/>
  <text x="408" y="205" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">ZEUS</text>
  <text x="408" y="218" text-anchor="middle" fill="#64748b" font-size="8">verify</text>
  <text x="464" y="210" text-anchor="middle" fill="#334155" font-size="14">→</text>
  <rect x="480" y="190" width="80" height="36" rx="5" fill="#082f49" stroke="#0ea5e9" stroke-width="1"/>
  <text x="520" y="205" text-anchor="middle" fill="#7dd3fc" font-size="10" font-weight="600">ATLAS</text>
  <text x="520" y="218" text-anchor="middle" fill="#64748b" font-size="8">monitor</text>
  <text x="576" y="210" text-anchor="middle" fill="#334155" font-size="14">→</text>
  <rect x="592" y="190" width="80" height="36" rx="5" fill="#431407" stroke="#f97316" stroke-width="1"/>
  <text x="632" y="205" text-anchor="middle" fill="#fdba74" font-size="10" font-weight="600">AUREA</text>
  <text x="632" y="218" text-anchor="middle" fill="#64748b" font-size="8">synthesize</text>
  <!-- Arrow 2 -->
  <line x1="400" y1="242" x2="400" y2="268" stroke="#334155" stroke-width="1.5"/>
  <polygon points="394,264 400,274 406,264" fill="#334155"/>
  <!-- Layer 3: Verification Pipeline -->
  <rect x="160" y="276" width="480" height="72" rx="8" fill="#0f172a" stroke="url(#amberGrad)" stroke-width="1"/>
  <text x="400" y="298" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600" letter-spacing="2">VERIFICATION PIPELINE</text>
  <text x="260" y="322" text-anchor="middle" fill="#94a3b8" font-size="11">confidence tiers</text>
  <text x="400" y="322" text-anchor="middle" fill="#94a3b8" font-size="11">source chains</text>
  <text x="530" y="322" text-anchor="middle" fill="#94a3b8" font-size="11">consensus engine</text>
  <!-- Confidence tier mini-bar -->
  <rect x="175" y="332" width="16" height="6" rx="2" fill="#f59e0b" opacity="0.3"/>
  <rect x="195" y="332" width="16" height="6" rx="2" fill="#f59e0b" opacity="0.5"/>
  <rect x="215" y="332" width="16" height="6" rx="2" fill="#f59e0b" opacity="0.7"/>
  <rect x="235" y="332" width="16" height="6" rx="2" fill="#f59e0b" opacity="0.9"/>
  <rect x="255" y="332" width="16" height="6" rx="2" fill="#f59e0b"/>
  <!-- Arrow 3 -->
  <line x1="400" y1="348" x2="400" y2="374" stroke="#334155" stroke-width="1.5"/>
  <polygon points="394,370 400,380 406,370" fill="#334155"/>
  <!-- Layer 4: Integrity Score -->
  <rect x="220" y="382" width="360" height="72" rx="8" fill="#0f172a" stroke="url(#emeraldGrad)" stroke-width="1"/>
  <text x="400" y="404" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600" letter-spacing="2">GLOBAL INTEGRITY SCORE</text>
  <!-- GI meter visualization -->
  <rect x="260" y="416" width="280" height="10" rx="5" fill="#1e293b"/>
  <rect x="260" y="416" width="263" height="10" rx="5" fill="url(#emeraldGrad)" opacity="0.8"/>
  <text x="400" y="440" text-anchor="middle" fill="#94a3b8" font-size="11">trust · reliability · stability</text>
  <!-- Arrow 4 -->
  <line x1="400" y1="454" x2="400" y2="480" stroke="#334155" stroke-width="1.5"/>
  <polygon points="394,476 400,486 406,476" fill="#334155"/>
  <!-- Layer 5: Terminal -->
  <rect x="100" y="488" width="600" height="100" rx="10" fill="url(#termGrad)" stroke="url(#skyGrad)" stroke-width="1.5" filter="url(#glow)"/>
  <text x="400" y="514" text-anchor="middle" fill="#7dd3fc" font-size="12" font-weight="700" letter-spacing="3">MOBIUS CIVIC AI TERMINAL</text>
  <!-- Terminal feature boxes -->
  <rect x="130" y="528" width="108" height="28" rx="4" fill="#020617" stroke="#1e293b" stroke-width="1"/>
  <text x="184" y="546" text-anchor="middle" fill="#94a3b8" font-size="9">EPICON Feed</text>
  <rect x="250" y="528" width="108" height="28" rx="4" fill="#020617" stroke="#1e293b" stroke-width="1"/>
  <text x="304" y="546" text-anchor="middle" fill="#94a3b8" font-size="9">Agent Cortex</text>
  <rect x="370" y="528" width="108" height="28" rx="4" fill="#020617" stroke="#1e293b" stroke-width="1"/>
  <text x="424" y="546" text-anchor="middle" fill="#94a3b8" font-size="9">GI Monitor</text>
  <rect x="490" y="528" width="108" height="28" rx="4" fill="#020617" stroke="#1e293b" stroke-width="1"/>
  <text x="544" y="546" text-anchor="middle" fill="#94a3b8" font-size="9">Tripwire Watch</text>
  <rect x="235" y="564" width="140" height="20" rx="4" fill="#020617" stroke="#1e293b" stroke-width="1"/>
  <text x="305" y="578" text-anchor="middle" fill="#64748b" font-size="8">Detail Inspector</text>
  <rect x="390" y="564" width="140" height="20" rx="4" fill="#020617" stroke="#1e293b" stroke-width="1"/>
  <text x="460" y="578" text-anchor="middle" fill="#64748b" font-size="8">Command Palette</text>
  <!-- Footer -->
  <text x="400" y="608" text-anchor="middle" fill="#334155" font-size="9" letter-spacing="1">CIVIC INTELLIGENCE · AUDITABLE SIGNALS · INTEGRITY IN MOTION</text>
</svg>
