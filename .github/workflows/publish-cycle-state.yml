# C-288 — Mobius Mesh Workflow v1 (Terminal)
# Declared in mobius.yaml → jobs.workflows (id: publish-cycle-state).
# Fetches public snapshot-lite, writes ledger/cycle-state.json for HIVE / Substrate / shell.

name: Publish cycle state

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-cycle-state
  cancel-in-progress: true

env:
  # Override via repo Actions variable TERMINAL_BASE_URL if staging; default is production Terminal.
  TERMINAL_BASE_URL: ${{ vars.TERMINAL_BASE_URL }}

jobs:
  publish-cycle-state:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch live inputs
        run: |
          set -euo pipefail
          BASE="${TERMINAL_BASE_URL:-https://mobius-civic-ai-terminal.vercel.app}"
          curl -fsSL "${BASE}/api/terminal/snapshot-lite" -o snapshot.json
          test -s snapshot.json
          curl -fsSL "${BASE}/api/vault/status" -o vault-status.json || echo '{"ok":false}' > vault-status.json
          curl -fsSL "https://raw.githubusercontent.com/kaizencycle/Mobius-Substrate/main/canon/reserve-blocks/MANIFEST.json" -o manifest.json || echo '{}' > manifest.json

      - name: Write cycle state
        run: node scripts/mesh/write-cycle-state.js snapshot.json vault-status.json manifest.json

      # C-339 PR-C item 1: regenerate the cycle headers in CURRENT_CYCLE.md /
      # CURRENT_STATE.md from the freshly written pulse so they can never freeze.
      - name: Regenerate cycle docs
        run: node scripts/gen-cycle-docs.mjs

      - name: Commit cycle state
        run: |
          set -euo pipefail
          git config user.name "mobius-bot"
          git config user.email "bot@mobius.systems"
          git add ledger/cycle-state.json CURRENT_CYCLE.md CURRENT_STATE.md
          if git diff --staged --quiet; then
            echo "No changes to cycle-state.json / cycle docs"
            exit 0
          fi
          git commit -m "chore(mesh): refresh cycle state V2 + docs from snapshot-lite"
          git push
