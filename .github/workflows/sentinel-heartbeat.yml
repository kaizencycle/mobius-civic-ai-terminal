# STEP 0 — Read shared world state (C-274): GET https://mobius-civic-ai-terminal.vercel.app/api/terminal/snapshot
# ═══════════════════════════════════════════════════════════════════════════════
# Sentinel Heartbeat — Agent Health Attestation
# ═══════════════════════════════════════════════════════════════════════════════
# C-292: reduced from */30 (48 runs/day, ~48 commits/day) to 0 */4 (6 runs/day).
# Also: only commits when health state CHANGES — eliminates identical repeat commits.
# The terminal already has KV-backed heartbeat via /api/cron/heartbeat on Vercel;
# this workflow supplements it with GitHub Actions-level health attestation.
# CC0 Public Domain
# ═══════════════════════════════════════════════════════════════════════════════

name: Sentinel Heartbeat

on:
  schedule:
    - cron: '0 */4 * * *'  # C-292: every 4h (was */30 = 48x/day → 6x/day, -88%)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (log only, no commit)'
        required: false
        default: false
        type: boolean
      force_commit:
        description: 'Force commit even if state unchanged'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  TERMINAL_URL: "https://mobius-civic-ai-terminal.vercel.app"
  MOBIUS_SERVICE_SECRET: ${{ secrets.MOBIUS_SERVICE_SECRET }}
  CRON_SECRET: ${{ secrets.CRON_SECRET }}

jobs:
  heartbeat:
    name: 🫀 Sentinel Heartbeat
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Poll terminal health endpoints
        id: poll
        run: |
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          NOW_FILE=$(date -u +"%Y%m%dT%H%M%SZ")
          echo "now=$NOW" >> $GITHUB_OUTPUT
          echo "now_file=$NOW_FILE" >> $GITHUB_OUTPUT

          MICRO_OK=false
          if curl -sf "${TERMINAL_URL}/api/signals/micro" -o /tmp/micro.json --max-time 15; then
            MICRO_OK=true
          else
            echo '{"ok":false,"composite":0.5,"allSignals":[],"anomalies":[],"healthy":false}' > /tmp/micro.json
          fi

          INTEGRITY_OK=false
          if curl -sf "${TERMINAL_URL}/api/integrity-status" -o /tmp/integrity.json --max-time 15; then
            INTEGRITY_OK=true
          else
            echo '{"ok":false,"global_integrity":0,"mode":"unknown"}' > /tmp/integrity.json
          fi

          RUNTIME_OK=false
          AUTH_SECRET="${MOBIUS_SERVICE_SECRET:-${CRON_SECRET:-}}"
          if [ -n "$AUTH_SECRET" ]; then
            if curl -sf "${TERMINAL_URL}/api/runtime/heartbeat" \
                -H "Authorization: Bearer ${AUTH_SECRET}" \
                -o /tmp/runtime.json --max-time 10; then
              RUNTIME_OK=true
            fi
          else
            if curl -sf "${TERMINAL_URL}/api/runtime/heartbeat" \
                -o /tmp/runtime.json --max-time 10; then
              RUNTIME_OK=true
            fi
          fi

          COMPOSITE=$(python3 -c "import json; d=json.load(open('/tmp/micro.json')); print(d.get('composite', 0.5))" 2>/dev/null || echo "0.5")
          ANOMALY_COUNT=$(python3 -c "import json; d=json.load(open('/tmp/micro.json')); a=d.get('anomalies',[]); print(len(a) if isinstance(a,list) else 0)" 2>/dev/null || echo "0")
          GI=$(python3 -c "import json; d=json.load(open('/tmp/integrity.json')); print(d.get('global_integrity', 0))" 2>/dev/null || echo "0")
          MODE=$(python3 -c "import json; d=json.load(open('/tmp/integrity.json')); print(d.get('mode', 'unknown'))" 2>/dev/null || echo "unknown")

          if [ "$MICRO_OK" = "true" ] && [ "$INTEGRITY_OK" = "true" ] && [ "$RUNTIME_OK" = "true" ]; then
            HEALTH="nominal"
          elif [ "$MICRO_OK" = "true" ] || [ "$INTEGRITY_OK" = "true" ]; then
            HEALTH="degraded"
          else
            HEALTH="offline"
          fi

          echo "micro_ok=$MICRO_OK" >> $GITHUB_OUTPUT
          echo "integrity_ok=$INTEGRITY_OK" >> $GITHUB_OUTPUT
          echo "runtime_ok=$RUNTIME_OK" >> $GITHUB_OUTPUT
          echo "composite=$COMPOSITE" >> $GITHUB_OUTPUT
          echo "anomaly_count=$ANOMALY_COUNT" >> $GITHUB_OUTPUT
          echo "gi=$GI" >> $GITHUB_OUTPUT
          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "health=$HEALTH" >> $GITHUB_OUTPUT

      - name: Write heartbeat entry
        if: ${{ !inputs.dry_run }}
        id: write
        run: |
          NOW="${{ steps.poll.outputs.now }}"
          NOW_FILE="${{ steps.poll.outputs.now_file }}"
          mkdir -p docs/catalog/heartbeats

          cat > "/tmp/heartbeat_new.json" <<HBEOF
          {
            "timestamp": "${NOW}",
            "health": "${{ steps.poll.outputs.health }}",
            "endpoints": {
              "micro_agents": ${{ steps.poll.outputs.micro_ok }},
              "integrity": ${{ steps.poll.outputs.integrity_ok }},
              "runtime": ${{ steps.poll.outputs.runtime_ok }}
            },
            "signals": {
              "composite": ${{ steps.poll.outputs.composite }},
              "anomalies": ${{ steps.poll.outputs.anomaly_count }},
              "gi": ${{ steps.poll.outputs.gi }},
              "mode": "${{ steps.poll.outputs.mode }}"
            }
          }
          HBEOF

          # C-292: only commit when health state changed from last entry.
          # Eliminates hundreds of identical "nominal · GI 0.686" commits per week.
          LAST=$(ls -1t docs/catalog/heartbeats/*.json 2>/dev/null | head -1)
          STATE_CHANGED=true
          if [ -n "$LAST" ]; then
            LAST_HEALTH=$(python3 -c "import json; print(json.load(open('$LAST')).get('health',''))" 2>/dev/null || echo "")
            LAST_MODE=$(python3 -c "import json; print(json.load(open('$LAST')).get('signals',{}).get('mode',''))" 2>/dev/null || echo "")
            if [ "$LAST_HEALTH" = "${{ steps.poll.outputs.health }}" ] \
               && [ "$LAST_MODE" = "${{ steps.poll.outputs.mode }}" ] \
               && [ "${{ inputs.force_commit }}" != "true" ]; then
              STATE_CHANGED=false
              echo "Health state unchanged (${{ steps.poll.outputs.health }} / ${{ steps.poll.outputs.mode }}) — skipping commit"
            fi
          fi

          if [ "$STATE_CHANGED" = "true" ]; then
            cp /tmp/heartbeat_new.json "docs/catalog/heartbeats/${NOW_FILE}.json"
            cd docs/catalog/heartbeats
            ls -1t *.json 2>/dev/null | tail -n +101 | xargs rm -f 2>/dev/null || true
          fi

          echo "state_changed=$STATE_CHANGED" >> $GITHUB_OUTPUT

      - name: Commit heartbeat
        if: ${{ !inputs.dry_run && steps.write.outputs.state_changed == 'true' }}
        run: |
          git config user.name "mobius-bot"
          git config user.email "bot@mobius.substrate"
          git add docs/catalog/heartbeats/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "heartbeat: ${{ steps.poll.outputs.health }} · GI ${{ steps.poll.outputs.gi }} · ${{ steps.poll.outputs.mode }} [skip ci]"
            git push
          fi

      - name: Summary
        if: always()
        run: |
          echo "## 🫀 Sentinel Heartbeat" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp | ${{ steps.poll.outputs.now }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Health | ${{ steps.poll.outputs.health }} |" >> $GITHUB_STEP_SUMMARY
          echo "| GI | ${{ steps.poll.outputs.gi }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mode | ${{ steps.poll.outputs.mode }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Composite | ${{ steps.poll.outputs.composite }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Anomalies | ${{ steps.poll.outputs.anomaly_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Micro-agents | ${{ steps.poll.outputs.micro_ok }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integrity API | ${{ steps.poll.outputs.integrity_ok }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Runtime | ${{ steps.poll.outputs.runtime_ok }} |" >> $GITHUB_STEP_SUMMARY
