# Declared in mobius.yaml — Phase 1 Civic Mesh world signal filter.
# Manual trigger: @Mobius run fetch-hive-world

name: Fetch HIVE world

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-hive-world:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Browser Shell / HIVE world pulse
        env:
          TERMINAL_SNAPSHOT_URL: https://mobius-civic-ai-terminal.vercel.app/api/terminal/snapshot-lite
          BROWSER_SHELL_URL: https://mobius-browser-shell.vercel.app
          HIVE_WORLD_URL: ${{ vars.HIVE_WORLD_URL }}
        run: |
          set -euo pipefail
          mkdir -p ledger
          python3 << 'PY'
          import hashlib
          import json
          import os
          import urllib.request
          from datetime import datetime, timezone

          def fetch_json(url, timeout=20):
              if not url:
                  return None, "not_configured"
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "mobius-hive-world-pulse/1.0"})
                  with urllib.request.urlopen(req, timeout=timeout) as res:
                      raw = res.read().decode("utf-8")
                      try:
                          return json.loads(raw), None
                      except Exception:
                          return {"html_reachable": True, "bytes": len(raw)}, None
              except Exception as exc:
                  return None, str(exc)

          now = datetime.now(timezone.utc).isoformat().replace("+00:00", "Z")
          terminal, terminal_err = fetch_json(os.environ["TERMINAL_SNAPSHOT_URL"])
          shell_root, shell_err = fetch_json(os.environ["BROWSER_SHELL_URL"])
          hive_world, hive_err = fetch_json(os.environ.get("HIVE_WORLD_URL", ""))
          cycle = (terminal or {}).get("cycle") or "C-—"
          gi = (terminal or {}).get("gi")
          errors = {}
          if terminal_err:
              errors["terminal"] = terminal_err
          if shell_err:
              errors["browser_shell"] = shell_err
          if hive_err and hive_err != "not_configured":
              errors["hive_world"] = hive_err

          pulse = {
              "schema": "HIVE_WORLD_PULSE_V1",
              "node_id": "mobius-terminal",
              "generated_at": now,
              "cycle": cycle,
              "gi": gi,
              "sources": {
                  "terminal_snapshot": bool(terminal),
                  "browser_shell_reachable": bool(shell_root),
                  "hive_world_configured": bool(os.environ.get("HIVE_WORLD_URL", "")),
                  "hive_world_reachable": bool(hive_world),
              },
              "world_state": {
                  "browser_shell": shell_root,
                  "hive_world": hive_world,
              },
              "errors": errors,
              "agent_routing": {
                  "ECHO": "ingest world pulse",
                  "HERMES": "route world packets",
                  "ATLAS": "assess world state",
                  "JADE": "gate canon world changes",
              },
          }
          encoded = json.dumps(pulse, sort_keys=True).encode("utf-8")
          pulse["source_hash"] = hashlib.sha256(encoded).hexdigest()
          pulse["idempotency_key"] = f"mobius-terminal:HIVE_WORLD_PULSE_V1:{cycle}:{pulse['source_hash'][:16]}:fetch-hive-world"
          with open("ledger/hive-world-pulse.json", "w", encoding="utf-8") as f:
              json.dump(pulse, f, indent=2, sort_keys=True)
              f.write("\n")
          PY

      - name: Commit HIVE world pulse
        run: |
          git config user.name "mobius-bot"
          git config user.email "bot@mobius.substrate"
          git add ledger/hive-world-pulse.json
          if git diff --cached --quiet; then
            echo "No HIVE world pulse changes"
          else
            git commit -m "chore(mesh): fetch HIVE world pulse [skip ci]"
            git push
          fi
