# mobius.yaml — Node declaration contract v1.1 (C-292)
# Canon: this file declares identity, pulse, ingest targets, MCP, workflow status, and policy — it does not perform writes.
# Write path: KV / runtime → writer / orchestrator → declared ingest target → durable ledger → optional feed mirror.
# Phase 1 Civic Mesh: Terminal is the big pulse; workflows are mesh filters, not random jobs.

version: "1.1"

mesh:
  enabled: true
  node_id: "mobius-terminal"
  node_name: "Mobius Civic AI Terminal"
  tier: "operator"
  role: "operator_console"
  node_type: "app"
  substrate_ref: "kaizencycle/Mobius-Substrate"
  covenant: "integrity"
  agent_affinity:
    - ZEUS
    - ATLAS

  repository:
    full_name: "kaizencycle/mobius-civic-ai-terminal"
    default_branch: "main"

  discovery:
    enabled: true
    registry_participation: true

  civic_mesh:
    phase: 1
    role: "big_pulse"
    loop: "observe_digest_interpret_propose_review_merge_canonize"
    canon: "The Terminal is the pulse. Repos are organs. Workflows are arteries. Agents are immune cells. Human merge is consent."
    nodes:
      terminal: "kaizencycle/mobius-civic-ai-terminal"
      substrate: "kaizencycle/Mobius-Substrate"
      civic_ledger: "kaizencycle/Civic-Protocol-Core"
      browser_shell: "kaizencycle/mobius-browser-shell"
      oaa_memory: "kaizencycle/OAA-API-Library"
      hive_world: "kaizencycle/mobius-hive"

  # Legacy mesh blocks (retained for backward compatibility with prior manifests)
  ledger:
    enabled: true
    backend: "github-actions"
    feed_url: "https://mobius-civic-ai-terminal.vercel.app/api/epicon/feed"
    push_to_substrate: true
  mii:
    track: true
    baseline: 0.85
  epicon:
    intent_blocks_required: true
    push_on_merge: true
  mic:
    participate: true
    reward_type: "MIC_REWARD_V2"

pulse:
  enabled: true
  health_url: "https://mobius-civic-ai-terminal.vercel.app/api/health"
  feed_url: "https://mobius-civic-ai-terminal.vercel.app/api/epicon/feed"
  snapshot_url: "https://mobius-civic-ai-terminal.vercel.app/api/terminal/snapshot-lite"
  full_snapshot_url: "https://mobius-civic-ai-terminal.vercel.app/api/terminal/snapshot"
  journal_url: "https://mobius-civic-ai-terminal.vercel.app/api/chambers/journal?mode=hot&limit=100"
  lane_diagnostics_url: "https://mobius-civic-ai-terminal.vercel.app/api/chambers/lane-diagnostics"
  freshness_sla_seconds: 900
  integrity_weight: 1.0
  lanes:
    - integrity
    - signals
    - tripwire
    - heartbeat
    - journal
    - ledger
    - mic_readiness
    - vault
    - mcp
  authoritative_for:
    - terminal_snapshot
    - mic_readiness
    - vault_runtime
    - current_cycle
    - operator_pulse
  emits:
    heartbeat: true
    gi: true
    mii: true
    mic: true
    vault: true
    tripwire: true
    anomalies: true
    current_cycle: true
    journal_hot: true

flow:
  model: "river_not_dam"
  hot:
    lane: "KV HOT"
    role: "short_term_live_memory"
    visible_window: 100
    recommended_retention: "rolling"
  digest:
    lane: "ECHO LANE DIGEST"
    role: "filter_firehose_into_chamber_packets"
  agents:
    role: "sample_shape_challenge_gate_synthesize_repair"
    rate_limiters:
      ECHO: "intake_sampler"
      HERMES: "dedupe_packet_router"
      ZEUS: "contamination_challenge"
      JADE: "canon_gate"
      EVE: "synthesis_compressor"
      AUREA: "overflow_architecture_review"
      DAEDALUS: "repair_pr_generator"
      ATLAS: "operator_assessment"
  terminal:
    role: "operator_view_not_storage"
  overflow_route:
    - "HOT_KV"
    - "SUBSTRATE_JOURNAL"
    - "CIVIC_LEDGER_PROOF"
  rule: "All data may enter HOT. Not all HOT becomes priority. Not all priority becomes canon. Not all canon candidates become sealed."

ingest:
  enabled: true
  # write_through: hot KV + sovereign OAA append + durable Civic Core (see mesh/mobius-yaml-spec.md)
  mode: "write_through"
  hot_state:
    type: "upstash_kv"
  sovereign_memory:
    node_id: "oaa-api-library"
    # Full URL to POST /api/oaa/kv — if empty, use OAA_API_BASE from env (see .env.example)
    write_url: ""
    auth: "hmac"
  durable_ledger:
    node_id: "civic-protocol-core"
    # Same as ingest.targets[0]; bearer ingest to /mesh/ingest
    write_url: ""
    auth: "bearer"
  idempotency:
    required: true
    key_fields:
      - node_id
      - event_type
      - cycle
      - source_hash
      - workflow_id
  targets:
    - node_id: "civic-protocol-core"
      purpose: "durable_ledger"
      # If empty, runtime resolves from MOBIUS_INGEST_WRITE_URL (see .env.example).
      write_url: ""
      auth: "bearer"
      accepts:
        - EPICON_ENTRY_V1
        - MIC_READINESS_V1
        - MIC_SEAL_V1
        - MIC_RESERVE_RECONCILIATION_V1
        - MIC_GENESIS_BLOCK
        - MOBIUS_PULSE_V1
        - OAA_MEMORY_ENTRY_V1
        - MESH_STATE_V1
        - HIVE_WORLD_PULSE_V1
        - WORLD_UPDATE_V1

mcp:
  enabled: true
  server_url: "https://mobius-civic-ai-terminal.vercel.app/api/mcp"
  discovery_url: "https://mobius-civic-ai-terminal.vercel.app/.well-known/mcp.json"
  transport: "streamable-http"
  schema_version: "MCP-2025-03-26"
  integrity:
    require_gi_above: 0.5
    log_all_invocations: true
    invocation_agent: "HERMES"
    verification_agent: "ZEUS"
    mic_reward_on_invocation: false
  tools:
    - name: "get_integrity_snapshot"
      description: "Returns snapshot-lite GI, mode, lane freshness, deployment meta."
      endpoint: "/api/terminal/snapshot-lite"
      method: "GET"
      auth: "none"
      epicon_tag: "tool:integrity-read"
    - name: "get_epicon_feed"
      description: "Returns recent EPICON / civic ledger rows from the Terminal feed."
      endpoint: "/api/epicon/feed"
      method: "GET"
      auth: "none"
      epicon_tag: "tool:ledger-read"
    - name: "get_vault_status"
      description: "Returns MIC vault state — reserve, tranche, Seal lane, hash coverage."
      endpoint: "/api/vault/status"
      method: "GET"
      auth: "none"
      epicon_tag: "tool:vault-read"
    - name: "get_agent_journal"
      description: "Returns recent sentinel journal entries (substrate-backed)."
      endpoint: "/api/agents/journal"
      method: "GET"
      auth: "none"
      epicon_tag: "tool:journal-read"
    - name: "post_epicon_entry"
      description: "Triggers ECHO ingest (POST /api/echo/ingest) — operational write; MCP logs intent to EPICON feed."
      endpoint: "/api/echo/ingest"
      method: "POST"
      auth: "none"
      epicon_tag: "tool:ledger-write"
      requires_gi_above: 0.6
    - name: "get_mic_readiness"
      description: "Returns MIC_READINESS_V1 (merged) + proof metadata."
      endpoint: "/api/mic/readiness"
      method: "GET"
      auth: "none"
      epicon_tag: "tool:mic-read"

policy:
  write_truth_locally: false
  mirror_feed_to_repo: true
  canonical_ledger_node: "civic-protocol-core"
  hash_algorithm: "sha256"
  terminal_is_storage: false
  terminal_is_operator_view: true
  human_merge_required_for_canon: true

# C-292 — Phase 1 Civic Mesh execution fabric.
jobs:
  enabled: true
  status_values:
    - active
    - manual
    - planned
    - archived
  workflows:
    - id: "publish-cycle-state"
      file: ".github/workflows/publish-cycle-state.yml"
      status: "active"
      trigger: "schedule"
      cron: "*/10 * * * *"
      role: "pulse_publish"
      lane: "terminal_snapshot"
      output:
        - "ledger/cycle-state.json"
      description: "Fetch snapshot-lite → ledger/cycle-state.json for HIVE / Substrate / browser-shell"
    - id: "mesh-aggregate"
      file: ".github/workflows/mesh-aggregate.yml"
      status: "manual"
      trigger: "manual"
      role: "mesh_filter"
      lane: "civic_mesh_state"
      output:
        - "ledger/mesh-state.json"
        - "ledger/mesh-health.json"
        - "ledger/mesh-todos.json"
      description: "Aggregate Terminal/Substrate/Civic/OAA/Browser/HIVE node pulses into one mesh state"
    - id: "fetch-hive-world"
      file: ".github/workflows/fetch-hive-world.yml"
      status: "manual"
      trigger: "manual"
      role: "world_signal_filter"
      lane: "hive_world"
      output:
        - "ledger/hive-world-pulse.json"
      description: "Fetch Browser Shell / HIVE world pulse and convert it into civic signal packets"
    - id: "world-update"
      file: ".github/workflows/world-update.yml"
      status: "manual"
      trigger: "manual"
      role: "post_merge_state_publisher"
      lane: "merged_canon_update"
      output:
        - "ledger/world-update.json"
      description: "Publish approved merged canon state back into Terminal-readable world state"
    - id: "catalog"
      file: ".github/workflows/catalog.yml"
      status: "planned"
      trigger: "schedule"
      role: "catalog_snapshot"
      issue: "Uses hardcoded GI; should read snapshot-lite before active use"
    - id: "gi-gate"
      file: ".github/workflows/gi-gate.yml"
      status: "planned"
      trigger: "pull_request"
      role: "merge_integrity_gate"
      issue: "Uses fallback/local GI; should read live snapshot-lite or PR-local integrity output"

governance:
  agent_prs_allowed: true
  auto_merge_allowed: false
  required_reviewers:
    - "ZEUS"
    - "ATLAS"
