# mobius.yaml — Node declaration contract v1.1 (C-292)
# Canon: this file declares identity, pulse, ingest targets, MCP, workflow status, and policy.
# C-292: workflow statuses corrected — catalog and gi-gate are active (were: unlisted/planned).
# auto-seal-check suspended. sentinel-heartbeat and epicon-kv-sync rates updated.

version: "1.1"

mesh:
  enabled: true
  node_id: "mobius-terminal"
  node_name: "Mobius Civic AI Terminal"
  tier: "operator"
  role: "operator_console"
  node_type: "app"
  substrate_ref: "kaizencycle/Mobius-Substrate"
  covenant: "integrity"
  agent_affinity:
    - ZEUS
    - ATLAS

  repository:
    full_name: "kaizencycle/mobius-civic-ai-terminal"
    default_branch: "main"

  discovery:
    enabled: true
    registry_participation: true

  # Legacy mesh blocks (retained for backward compatibility with prior manifests)
  ledger:
    enabled: true
    backend: "github-actions"
    feed_url: "https://mobius-civic-ai-terminal.vercel.app/api/epicon/feed"
    push_to_substrate: true
  mii:
    track: true
    baseline: 0.85
  epicon:
    intent_blocks_required: true
    push_on_merge: true
  mic:
    participate: true
    reward_type: "MIC_REWARD_V2"

pulse:
  enabled: true
  health_url: "https://mobius-civic-ai-terminal.vercel.app/api/health"
  feed_url: "https://mobius-civic-ai-terminal.vercel.app/api/epicon/feed"
  snapshot_url: "https://mobius-civic-ai-terminal.vercel.app/api/terminal/snapshot-lite"
  full_snapshot_url: "https://mobius-civic-ai-terminal.vercel.app/api/terminal/snapshot"
  journal_url: "https://mobius-civic-ai-terminal.vercel.app/api/chambers/journal?mode=hot&limit=100"
  lane_diagnostics_url: "https://mobius-civic-ai-terminal.vercel.app/api/chambers/lane-diagnostics"
  # C-292: watermark endpoint for diagnosing cron write flow per lane
  watermark_url: "https://mobius-civic-ai-terminal.vercel.app/api/debug/watermark"
  freshness_sla_seconds: 900
  integrity_weight: 1.0
  lanes:
    - integrity
    - signals
    - tripwire
    - heartbeat
    - journal
    - ledger
    - mic_readiness
    - vault
    - mcp
  authoritative_for:
    - terminal_snapshot
    - mic_readiness
    - vault_runtime
    - current_cycle
    - operator_pulse
  emits:
    heartbeat: true
    gi: true
    mii: true
    mic: true
    vault: true
    tripwire: true
    anomalies: true
    current_cycle: true
    journal_hot: true

ingest:
  enabled: true
  # write_through: hot KV + sovereign OAA append + durable Civic Core (see mesh/mobius-yaml-spec.md)
  mode: "write_through"
  hot_state:
    type: "upstash_kv"
  sovereign_memory:
    node_id: "oaa-api-library"
    # Full URL to POST /api/oaa/kv — if empty, use OAA_API_BASE from env (see .env.example)
    write_url: ""
    auth: "hmac"
  durable_ledger:
    node_id: "civic-protocol-core"
    # Same as ingest.targets[0]; bearer ingest to /mesh/ingest
    write_url: ""
    auth: "bearer"
  targets:
    - node_id: "civic-protocol-core"
      purpose: "durable_ledger"
      # If empty, runtime resolves from MOBIUS_INGEST_WRITE_URL (see .env.example).
      write_url: ""
      auth: "bearer"
      accepts:
        - EPICON_ENTRY_V1
        - MIC_READINESS_V1
        - MIC_SEAL_V1
        - MIC_RESERVE_RECONCILIATION_V1
        - MIC_GENESIS_BLOCK
        - MOBIUS_PULSE_V1
        - OAA_MEMORY_ENTRY_V1

mcp:
  enabled: true
  server_url: "https://mobius-civic-ai-terminal.vercel.app/api/mcp"
  discovery_url: "https://mobius-civic-ai-terminal.vercel.app/.well-known/mcp.json"
  transport: "streamable-http"
  schema_version: "MCP-2025-03-26"
  integrity:
    require_gi_above: 0.5
    log_all_invocations: true
    invocation_agent: "HERMES"
    verification_agent: "ZEUS"
    mic_reward_on_invocation: false
  tools:
    - name: "get_integrity_snapshot"
      description: "Returns snapshot-lite GI, mode, lane freshness, deployment meta."
      endpoint: "/api/terminal/snapshot-lite"
      method: "GET"
      auth: "none"
      epicon_tag: "tool:integrity-read"
    - name: "get_epicon_feed"
      description: "Returns recent EPICON / civic ledger rows from the Terminal feed."
      endpoint: "/api/epicon/feed"
      method: "GET"
      auth: "none"
      epicon_tag: "tool:ledger-read"
    - name: "get_vault_status"
      description: "Returns MIC vault state — reserve, tranche, Seal lane, hash coverage."
      endpoint: "/api/vault/status"
      method: "GET"
      auth: "none"
      epicon_tag: "tool:vault-read"
    - name: "get_agent_journal"
      description: "Returns recent sentinel journal entries (substrate-backed)."
      endpoint: "/api/agents/journal"
      method: "GET"
      auth: "none"
      epicon_tag: "tool:journal-read"
    - name: "post_epicon_entry"
      description: "Triggers ECHO ingest (POST /api/echo/ingest) — operational write; MCP logs intent to EPICON feed."
      endpoint: "/api/echo/ingest"
      method: "POST"
      auth: "none"
      epicon_tag: "tool:ledger-write"
      requires_gi_above: 0.6
    - name: "get_mic_readiness"
      description: "Returns MIC_READINESS_V1 (merged) + proof metadata."
      endpoint: "/api/mic/readiness"
      method: "GET"
      auth: "none"
      epicon_tag: "tool:mic-read"

policy:
  write_truth_locally: false
  mirror_feed_to_repo: true
  canonical_ledger_node: "civic-protocol-core"
  hash_algorithm: "sha256"
  terminal_is_storage: false
  terminal_is_operator_view: true
  human_merge_required_for_canon: true

# C-292 — Workflow statuses corrected; auto-seal-check suspended; rates updated.
jobs:
  enabled: true
  status_values:
    - active
    - manual
    - planned
    - suspended
    - archived
  workflows:
    - id: "publish-cycle-state"
      file: ".github/workflows/publish-cycle-state.yml"
      status: "active"
      trigger: "schedule"
      cron: "*/10 * * * *"
      role: "pulse_publish"
      description: "Fetch snapshot-lite → ledger/cycle-state.json for HIVE / Substrate / browser-shell"

    - id: "sentinel-heartbeat"
      file: ".github/workflows/sentinel-heartbeat.yml"
      status: "active"
      trigger: "schedule"
      cron: "0 */4 * * *"
      role: "health_attestation"
      description: "C-292: reduced from */30 (48x/day) to 0 */4 (6x/day); diff-gated commits"

    - id: "epicon-kv-sync"
      file: ".github/workflows/epicon-kv-sync.yml"
      status: "active"
      trigger: "schedule"
      cron: "*/30 * * * *"
      role: "kv_keepalive"
      description: "C-292: reduced from */15 (96x/day) to */30 (48x/day)"

    - id: "catalog"
      file: ".github/workflows/catalog.yml"
      status: "active"
      trigger: "schedule"
      cron: "0 */2 * * *"
      role: "catalog_snapshot"
      description: "C-292: upgraded — now reads live GI/mode/cycle from snapshot-lite (was hardcoded 0.78)"

    - id: "gi-gate"
      file: ".github/workflows/gi-gate.yml"
      status: "active"
      trigger: "pull_request"
      role: "merge_integrity_gate"
      description: "C-292: upgraded — now fetches live GI from snapshot-lite (was broken local lib/gi/compute)"

    - id: "anti-nuke"
      file: ".github/workflows/anti-nuke.yml"
      status: "active"
      trigger: "pull_request"
      role: "mass_delete_guard"
      description: "Blocks PRs with excessive file deletions in protected paths"

    - id: "sentinel-review"
      file: ".github/workflows/sentinel-review.yml"
      status: "active"
      trigger: "pull_request"
      role: "ai_pr_review"
      description: "ATLAS (Anthropic) + AUREA (OpenAI) PR review — label-gated"

    - id: "mesh-aggregate"
      file: ".github/workflows/mesh-aggregate.yml"
      status: "manual"
      trigger: "manual"
      role: "mesh_filter"
      description: "Aggregate Terminal/Substrate/Civic/OAA/Browser/HIVE node pulses"

    - id: "fetch-hive-world"
      file: ".github/workflows/fetch-hive-world.yml"
      status: "manual"
      trigger: "manual"
      role: "world_signal_filter"
      description: "HIVE world signal fetch"

    - id: "world-update"
      file: ".github/workflows/world-update.yml"
      status: "manual"
      trigger: "manual"
      role: "post_merge_state_publisher"
      description: "Post-merge state publisher"

    - id: "auto-seal-check"
      file: ".github/workflows/auto-seal-check.yml"
      status: "suspended"
      trigger: "manual"
      role: "vault_seal_trigger"
      description: "C-292: suspended — was firing 288x/day with unconfigured SEAL_ISSUE_URL secret. Vercel cron at /api/cron/vault-attestation handles sealing."

governance:
  agent_prs_allowed: true
  auto_merge_allowed: false
  required_reviewers:
    - "ZEUS"
    - "ATLAS"
